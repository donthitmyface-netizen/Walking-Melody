<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 160" width="120" height="160">
  <defs>
    <!-- Ink wash texture gradient -->
    <radialGradient id="inkWash" cx="50%" cy="60%" r="55%">
      <stop offset="0%" stop-color="#1a0a00" stop-opacity="0.95"/>
      <stop offset="60%" stop-color="#2d1200" stop-opacity="0.85"/>
      <stop offset="100%" stop-color="#4a2000" stop-opacity="0.5"/>
    </radialGradient>
    <!-- Brush stroke filter for ink effect -->
    <filter id="ink" x="-5%" y="-5%" width="110%" height="110%">
      <feTurbulence type="fractalNoise" baseFrequency="0.065" numOctaves="3" seed="8" result="noise"/>
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="1.8" xChannelSelector="R" yChannelSelector="G" result="displaced"/>
      <feGaussianBlur in="displaced" stdDeviation="0.4" result="blurred"/>
      <feComposite in="blurred" in2="SourceGraphic" operator="in"/>
    </filter>
    <filter id="inkHeavy" x="-5%" y="-5%" width="110%" height="110%">
      <feTurbulence type="fractalNoise" baseFrequency="0.08" numOctaves="2" seed="3" result="noise"/>
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="1.2" xChannelSelector="R" yChannelSelector="G"/>
    </filter>
  </defs>

  <!-- Background wash — faint circular ink stain -->
  <ellipse cx="60" cy="82" rx="52" ry="58" fill="#3a1800" opacity="0.08"/>

  <!-- Treble clef drawn as brush strokes -->
  <g filter="url(#ink)" fill="url(#inkWash)">

    <!-- Main stem — bold vertical brush stroke, slightly tapered -->
    <path d="
      M 62 18
      C 63.5 18, 65 19, 65 21
      L 64.5 118
      C 64.5 120, 63 121, 61.5 121
      C 60 121, 58.5 120, 58.5 118
      L 58 21
      C 58 19, 60 18, 62 18 Z
    " opacity="0.92"/>

    <!-- Upper curl — the signature treble sweep -->
    <path d="
      M 62 22
      C 62 22, 82 28, 85 46
      C 88 62, 76 76, 62 76
      C 48 76, 38 67, 38 54
      C 38 41, 47 33, 58 33
      C 66 33, 72 38, 72 46
      C 72 54, 67 59, 60 59
      C 55 59, 51 56, 51 51
      C 51 47, 54 44, 58 44
      C 61 44, 63 46, 63 49
      C 63 52, 61 54, 58.5 53.5
    " stroke="#1a0800" stroke-width="5.5" fill="none"
      stroke-linecap="round" stroke-linejoin="round" opacity="0.90"/>

    <!-- Lower loop — where the clef wraps below the staff -->
    <path d="
      M 61.5 118
      C 61.5 118, 76 115, 78 104
      C 80 93, 72 86, 63 88
      C 54 90, 49 98, 52 107
      C 55 116, 64 119, 70 116
    " stroke="#1a0800" stroke-width="5" fill="none"
      stroke-linecap="round" stroke-linejoin="round" opacity="0.88"/>

    <!-- Bottom tail — decorative flourish -->
    <path d="
      M 52 107
      C 48 112, 46 120, 50 128
      C 53 135, 61 138, 68 135
      C 75 132, 78 124, 75 117
    " stroke="#1a0800" stroke-width="4.5" fill="none"
      stroke-linecap="round" opacity="0.80"/>

  </g>

  <!-- Subtle ink splatter dots for brush texture -->
  <circle cx="36" cy="50" r="1.2" fill="#1a0800" opacity="0.18"/>
  <circle cx="88" cy="72" r="0.9" fill="#1a0800" opacity="0.14"/>
  <circle cx="42" cy="110" r="1.0" fill="#1a0800" opacity="0.16"/>
  <circle cx="80" cy="38" r="0.7" fill="#1a0800" opacity="0.12"/>
</svg>
