<meta name="apple-mobile-web-app-capable" content="yes">

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getFirestore, collection, doc, setDoc, deleteDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyCNonPT0mdrzI9p8Qlh-iKbkqpJciJ64lQ",
    authDomain: "walking-melody.firebaseapp.com",
    projectId: "walking-melody",
    storageBucket: "walking-melody.firebasestorage.app",
    messagingSenderId: "906826621436",
    appId: "1:906826621436:web:96850e4bff2d470c7e5279",
    measurementId: "G-BNVWVLBXV7"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  window._db = db;
  window._fbModules = { collection, doc, setDoc, deleteDoc, onSnapshot };

  window.addEventListener('DOMContentLoaded', () => window._appInit());
</script>

<style>
  :root {
    --ink:#1a1208; --paper:#fdf8f0; --warm:#f5ede0; --accent:#c8562a;
    --accent2:#4a7c6f; --gold:#d4a853; --muted:#8a7d6b;
    --border:#e2d8cc; --card:#fffdf9; --shadow:rgba(26,18,8,0.08);
  }
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  body { font-family:'Noto Sans TC',sans-serif; background:var(--paper); color:var(--ink); min-height:100vh; overflow-x:hidden; }

  /* SPLASH */
  #splash { position:fixed; inset:0; background:var(--ink); z-index:999; display:flex; flex-direction:column; align-items:center; justify-content:center; transition:opacity .6s; }
  .splash-logo { font-family:'Noto Serif TC',serif; font-size:2.8rem; color:var(--gold); letter-spacing:.2em; }
  .splash-sub { font-size:.85rem; color:var(--muted); letter-spacing:.3em; margin-top:.5rem; }
  .splash-status { font-size:.75rem; color:var(--muted); margin-top:1.8rem; display:flex; align-items:center; gap:8px; }
  .splash-dot { width:6px; height:6px; border-radius:50%; background:var(--gold); animation:pulse 1s infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.3} }

  /* BANNER */
  #banner { position:fixed; top:0; left:0; right:0; z-index:300; background:var(--accent2); color:#fff; font-size:.75rem; text-align:center; padding:7px; display:none; }
  #banner.show { display:block; }
  #banner.err { background:#b54040; }

  /* HEADER */
  header { position:fixed; top:0; left:0; right:0; z-index:100; background:var(--card); border-bottom:1px solid var(--border); padding:env(safe-area-inset-top) 0 0; box-shadow:0 2px 12px var(--shadow); }
  .header-inner { display:flex; align-items:center; justify-content:space-between; padding:14px 20px; }
  .header-title { font-family:'Noto Serif TC',serif; font-size:1.15rem; letter-spacing:.1em; }
  .header-right { display:flex; align-items:center; gap:10px; }
  .hbtn { background:none; border:none; cursor:pointer; color:var(--accent); font-size:.9rem; font-family:'Noto Sans TC',sans-serif; font-weight:500; }
  .sync-dot { width:8px; height:8px; border-radius:50%; background:#ccc; flex-shrink:0; }
  .sync-dot.online { background:#4a7c6f; }
  .sync-dot.syncing { background:var(--gold); animation:pulse 1s infinite; }
  .sync-dot.error { background:#c05050; }

  /* NAV */
  nav { position:fixed; bottom:0; left:0; right:0; z-index:100; background:var(--card); border-top:1px solid var(--border); display:flex; padding-bottom:env(safe-area-inset-bottom); box-shadow:0 -4px 20px var(--shadow); }
  nav button { flex:1; border:none; background:none; padding:12px 4px 10px; display:flex; flex-direction:column; align-items:center; gap:4px; color:var(--muted); cursor:pointer; font-family:'Noto Sans TC',sans-serif; }
  nav button.active { color:var(--accent); }
  nav button svg { width:22px; height:22px; }
  nav button span { font-size:.65rem; letter-spacing:.05em; }

  /* PAGES */
  main { padding-top:72px; padding-bottom:80px; min-height:100vh; }
  .page { display:none; animation:fadeIn .3s ease; }
  .page.active { display:block; }
  @keyframes fadeIn { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:none} }

  /* DASHBOARD */
  .pad { padding:20px; }
  .greeting { font-family:'Noto Serif TC',serif; font-size:1.4rem; margin-bottom:4px; }
  .greeting span { color:var(--accent); }
  .date-line { color:var(--muted); font-size:.8rem; margin-bottom:24px; }
  .stat-row { display:grid; grid-template-columns:1fr 1fr; gap:12px; margin-bottom:24px; }
  .stat-card { background:var(--card); border:1px solid var(--border); border-radius:16px; padding:16px; position:relative; overflow:hidden; }
  .stat-card::before { content:''; position:absolute; top:0; left:0; right:0; height:3px; background:var(--accent); }
  .stat-card:nth-child(2)::before { background:var(--accent2); }
  .stat-num { font-family:'Noto Serif TC',serif; font-size:2rem; font-weight:700; }
  .stat-label { font-size:.72rem; color:var(--muted); margin-top:2px; }
  .sec-title { font-family:'Noto Serif TC',serif; font-size:1rem; letter-spacing:.1em; margin-bottom:14px; display:flex; align-items:center; gap:8px; }
  .sec-title::after { content:''; flex:1; height:1px; background:var(--border); }

  /* TODAY LIST */
  .today-item { background:var(--card); border:1px solid var(--border); border-radius:14px; padding:14px 16px; display:flex; align-items:center; gap:14px; cursor:pointer; margin-bottom:10px; }
  .today-item:active { opacity:.7; }
  .tdot { width:10px; height:10px; border-radius:50%; background:var(--accent); flex-shrink:0; }
  .tdot.g { background:var(--accent2); }

  /* STUDENT GRID */
  .search-bar { display:flex; align-items:center; gap:10px; background:var(--card); border:1px solid var(--border); border-radius:12px; padding:10px 14px; margin-bottom:20px; }
  .search-bar input { flex:1; border:none; background:none; font-size:.9rem; color:var(--ink); font-family:'Noto Sans TC',sans-serif; outline:none; }
  .s-card { background:var(--card); border:1px solid var(--border); border-radius:16px; overflow:hidden; cursor:pointer; margin-bottom:12px; }
  .s-card:active { opacity:.7; }
  .s-card-top { padding:16px; display:flex; align-items:center; gap:14px; }
  .avatar { width:46px; height:46px; border-radius:50%; font-size:1.2rem; display:flex; align-items:center; justify-content:center; font-family:'Noto Serif TC',serif; font-weight:700; flex-shrink:0; }
  .s-name { font-size:.95rem; font-weight:600; margin-bottom:2px; }
  .s-meta { font-size:.75rem; color:var(--muted); }
  .prog-wrap { padding:0 16px 14px; }
  .prog-label { display:flex; justify-content:space-between; font-size:.7rem; color:var(--muted); margin-bottom:5px; }
  .prog-bar { height:5px; background:var(--border); border-radius:99px; overflow:hidden; }
  .prog-fill { height:100%; border-radius:99px; background:var(--accent); transition:.6s; }

  /* DETAIL */
  .d-header { display:flex; align-items:center; gap:16px; background:var(--card); border:1px solid var(--border); border-radius:20px; padding:20px; margin-bottom:20px; }
  .d-avatar { width:64px; height:64px; border-radius:50%; font-size:1.8rem; display:flex; align-items:center; justify-content:center; }
  .d-name { font-family:'Noto Serif TC',serif; font-size:1.3rem; }
  .d-sub { font-size:.8rem; color:var(--muted); margin-top:3px; }
  .tab-row { display:flex; gap:8px; margin-bottom:18px; overflow-x:auto; scrollbar-width:none; }
  .tab-row::-webkit-scrollbar { display:none; }
  .tab-btn { border:1px solid var(--border); background:var(--card); border-radius:99px; padding:7px 18px; font-size:.8rem; cursor:pointer; white-space:nowrap; font-family:'Noto Sans TC',sans-serif; color:var(--muted); }
  .tab-btn.active { background:var(--ink); color:#fff; border-color:var(--ink); }
  .rec-item { background:var(--card); border:1px solid var(--border); border-radius:14px; padding:14px; margin-bottom:10px; }
  .rec-date { font-size:.72rem; color:var(--muted); margin-bottom:6px; }
  .rec-body { font-size:.88rem; line-height:1.6; }
  .tag { font-size:.68rem; padding:3px 10px; border-radius:99px; background:var(--warm); color:var(--accent); border:1px solid var(--border); display:inline-block; margin-top:8px; }

  /* SETTINGS */
  .settings-row { background:var(--card); border:1px solid var(--border); border-radius:14px; padding:16px; margin-bottom:12px; display:flex; align-items:center; justify-content:space-between; }
  .settings-label { font-size:.9rem; font-weight:600; margin-bottom:3px; }
  .settings-sub { font-size:.78rem; color:var(--muted); }

  /* MODALS */
  .overlay { display:none; position:fixed; inset:0; z-index:200; background:rgba(26,18,8,.5); backdrop-filter:blur(4px); }
  .overlay.open { display:flex; align-items:flex-end; }
  .modal { background:var(--paper); border-radius:24px 24px 0 0; width:100%; padding:20px 20px calc(20px + env(safe-area-inset-bottom)); animation:slideUp .35s cubic-bezier(.32,1.16,.54,1); max-height:90vh; overflow-y:auto; }
  @keyframes slideUp { from{transform:translateY(100%)} to{transform:none} }
  .modal-handle { width:40px; height:4px; background:var(--border); border-radius:99px; margin:0 auto 20px; }
  .modal-title { font-family:'Noto Serif TC',serif; font-size:1.15rem; margin-bottom:18px; }
  .modal input, .modal textarea, .modal select { width:100%; border:1px solid var(--border); background:var(--card); border-radius:12px; padding:12px 14px; font-size:.9rem; color:var(--ink); margin-bottom:12px; font-family:'Noto Sans TC',sans-serif; outline:none; appearance:auto; }
  .modal textarea { height:110px; resize:none; }
  .modal label { display:block; font-size:.8rem; color:var(--muted); margin-bottom:5px; margin-top:4px; }
  .mbtn { width:100%; background:var(--ink); color:#fff; border:none; border-radius:14px; padding:15px; font-size:.95rem; font-weight:600; cursor:pointer; margin-top:8px; font-family:'Noto Serif TC',sans-serif; letter-spacing:.08em; }
  .mbtn.sec { background:none; color:var(--muted); border:1px solid var(--border); }
  .mbtn:disabled { opacity:.4; cursor:not-allowed; }

  .empty { text-align:center; padding:50px 20px; color:var(--muted); }
  .empty .icon { font-size:3rem; margin-bottom:12px; }
  .empty p { font-size:.85rem; line-height:1.7; }

  /* Avatar colours */
  .c1{background:#f0e8d8;color:#8b5a2b} .c2{background:#d8e8d8;color:#2b6b4a}
  .c3{background:#d8e0f0;color:#2b4a8b} .c4{background:#f0d8e8;color:#8b2b6b} .c5{background:#f0f0d8;color:#6b6b2b}

  /* Danger btn */
  .danger-btn { width:100%; background:none; border:1px solid #e0a0a0; color:#c05050; border-radius:12px; padding:12px; font-size:.88rem; cursor:pointer; font-family:'Noto Sans TC',sans-serif; margin-top:10px; }
</style>

<script>
// ── STATE ──
let state = { students: [], records: {} };
let currentStudentId = null;
let currentDetailTab = 'records';
let currentPage = 'dashboard';

const COLORS = { 鋼琴:'c1', 小提琴:'c2', 結他:'c3', 長笛:'c5', 大提琴:'c4', 聲樂:'c2', 其他:'c5' };
const RATING_LABEL = ['','需要輔導','需加強','一般','良好','非常出色'];

// Local cache
function loadLocal() { try { const s = localStorage.getItem('mta_wm'); if(s) state = JSON.parse(s); } catch(e){} }
function saveLocal() { try { localStorage.setItem('mta_wm', JSON.stringify(state)); } catch(e){} }

// ── INIT ──
window._appInit = function() {
  loadLocal();
  updateDate();

  // Dismiss splash after Firebase connects (or 3s timeout)
  let splashDone = false;
  const dismissSplash = (msg) => {
    if (splashDone) return;
    splashDone = true;
    document.getElementById('splashMsg').textContent = msg;
    setTimeout(() => {
      const el = document.getElementById('splash');
      if (el) { el.style.opacity = '0'; setTimeout(() => el.remove(), 600); }
    }, 400);
  };
  setTimeout(() => dismissSplash('載入完成'), 3000);

  // Start Firebase listeners
  const db = window._db;
  const { collection, onSnapshot } = window._fbModules;

  setSyncStatus('syncing');

  // Students listener
  onSnapshot(collection(db, 'students'),
    snap => {
      state.students = snap.docs.map(d => ({ id: d.id, ...d.data() }));
      saveLocal(); renderAll();
      setSyncStatus('online');
      dismissSplash('已連接 ✓');
    },
    err => {
      console.error('Students sync error:', err);
      setSyncStatus('error');
      dismissSplash('使用本機資料');
      showBanner('⚠️ 雲端同步失敗，請檢查網絡', true);
      renderAll();
    }
  );

  // Records listener
  onSnapshot(collection(db, 'records'),
    snap => {
      state.records = {};
      snap.docs.forEach(d => {
        const data = d.data();
        if (!state.records[data.studentId]) state.records[data.studentId] = [];
        state.records[data.studentId].push({ id: d.id, ...data });
      });
      // Sort each student's records by createdAt ascending
      Object.keys(state.records).forEach(k =>
        state.records[k].sort((a, b) => (a.createdAt || 0) - (b.createdAt || 0))
      );
      saveLocal(); renderAll();
    },
    err => console.error('Records sync error:', err)
  );
};

// ── FIREBASE WRITE ──
async function fbSet(col, id, data) {
  const { doc, setDoc } = window._fbModules;
  try { await setDoc(doc(window._db, col, id), data); }
  catch(e) { console.error('fbSet error:', e); showBanner('⚠️ 儲存失敗：' + e.message, true); }
}
async function fbDel(col, id) {
  const { doc, deleteDoc } = window._fbModules;
  try { await deleteDoc(doc(window._db, col, id)); }
  catch(e) { console.error('fbDel error:', e); }
}

// ── SYNC STATUS ──
function setSyncStatus(s) {
  ['syncDot','syncDot2'].forEach(id => {
    const el = document.getElementById(id);
    if (!el) return;
    el.className = 'sync-dot' + (s==='online'?' online': s==='syncing'?' syncing': s==='error'?' error':'');
  });
  const t = document.getElementById('syncStatusText');
  if (t) t.textContent = s==='online'?'已連接 · 即時同步中 ✓': s==='syncing'?'連接中...': '同步失敗 · 使用本機資料';
}

function showBanner(msg, isErr) {
  const b = document.getElementById('banner');
  b.textContent = msg; b.className = 'show' + (isErr?' err':'');
  setTimeout(() => b.className = '', 4000);
}

// ── NAVIGATION ──
function showPage(id, btn, title, showAdd) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.getElementById('page-' + id).classList.add('active');
  document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
  if (btn) btn.classList.add('active');
  document.getElementById('pageTitle').textContent = title;
  currentPage = id;
  document.getElementById('headerAction').style.display = showAdd ? 'block' : 'none';
}

function showDetail(sid) {
  currentStudentId = sid;
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.getElementById('page-detail').classList.add('active');
  document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
  const s = state.students.find(x => x.id === sid);
  document.getElementById('pageTitle').textContent = s ? s.name : '學生詳情';
  document.getElementById('headerAction').textContent = '＋ 記錄';
  document.getElementById('headerAction').style.display = 'block';
  currentPage = 'detail';
  renderDetail(sid, 'records');
}

function handleAdd() {
  if (currentPage === 'detail') openAddRecord();
  else openAddStudent();
}

// ── RENDER ALL ──
function renderAll() {
  renderDashboard();
  renderStudents();
  if (currentPage === 'detail' && currentStudentId) renderDetail(currentStudentId, currentDetailTab);
}

function updateDate() {
  const d = new Date(), days = ['日','一','二','三','四','五','六'];
  document.getElementById('dateDisplay').textContent =
    `${d.getFullYear()} 年 ${d.getMonth()+1} 月 ${d.getDate()} 日 · 星期${days[d.getDay()]}`;
}

// ── DASHBOARD ──
function renderDashboard() {
  const count = state.students.length;
  document.getElementById('statStudents').textContent = count;

  const d = new Date(), days = ['日','一','二','三','四','五','六'];
  const today = '週' + days[d.getDay()];
  const todayS = state.students.filter(s => s.time && s.time.includes(today));
  document.getElementById('statToday').textContent = todayS.length;

  // Today list
  document.getElementById('todayList').innerHTML = todayS.length === 0
    ? '<div class="empty"><div class="icon">🎵</div><p>今日暫無課堂安排<br>點擊右上角新增學生</p></div>'
    : todayS.map(s => `
        <div class="today-item" onclick="showDetail('${s.id}')">
          <div class="tdot ${['鋼琴','小提琴'].includes(s.instrument) ? '' : 'g'}"></div>
          <div style="flex:1">
            <div style="font-size:.9rem;font-weight:500">${s.name}</div>
            <div style="font-size:.75rem;color:var(--muted)">${s.instrument} · ${s.level}</div>
          </div>
          <div style="font-size:.75rem;color:var(--muted);margin-right:6px">${s.time ? s.time.replace(/週./,'').trim() : ''}</div>
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="var(--muted)" stroke-width="2"><path d="m9 18 6-6-6-6"/></svg>
        </div>`).join('');

  // Recent records
  let all = [];
  state.students.forEach(s => (state.records[s.id]||[]).forEach(r => all.push({...r, studentName:s.name, studentId:s.id})));
  all.sort((a, b) => (b.createdAt||0) - (a.createdAt||0));

  document.getElementById('recentList').innerHTML = all.length === 0
    ? '<div class="empty"><div class="icon">📝</div><p>尚未有任何記錄<br>選擇學生後新增今日課堂記錄</p></div>'
    : all.slice(0, 4).map(r => `
        <div class="rec-item" style="cursor:pointer" onclick="showDetail('${r.studentId}')">
          <div style="display:flex;justify-content:space-between;margin-bottom:5px">
            <span style="font-size:.85rem;font-weight:600">${r.studentName}</span>
            <span style="font-size:.72rem;color:var(--muted)">${r.date}</span>
          </div>
          <div style="font-size:.82rem;color:var(--muted);line-height:1.5">${(r.content||'').slice(0,65)}${(r.content||'').length>65?'...':''}</div>
        </div>`).join('');
}

// ── STUDENTS ──
function renderStudents() {
  const grid = document.getElementById('studentGrid');
  if (!state.students.length) {
    grid.innerHTML = '<div class="empty"><div class="icon">🎼</div><p>未有學生資料<br>點擊右上角新增第一位學生</p></div>';
    return;
  }
  grid.innerHTML = state.students.map(s => {
    const recs = state.records[s.id] || [];
    return `
      <div class="s-card" onclick="showDetail('${s.id}')">
        <div class="s-card-top">
          <div class="avatar ${COLORS[s.instrument]||'c1'}">${s.name[0]}</div>
          <div style="flex:1">
            <div class="s-name">${s.name}</div>
            <div class="s-meta">${s.instrument} · ${s.level} · ${s.time||'未定'}</div>
          </div>
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="var(--muted)" stroke-width="2"><path d="m9 18 6-6-6-6"/></svg>
        </div>
        <div class="prog-wrap">
          <div class="prog-label"><span>學習記錄</span><span>${recs.length} 堂</span></div>
          <div class="prog-bar"><div class="prog-fill" style="width:${Math.min(100,recs.length*8)}%"></div></div>
        </div>
      </div>`;
  }).join('');
}

function filterStudents() {
  const q = document.getElementById('searchInput').value.toLowerCase();
  document.querySelectorAll('.s-card').forEach(c =>
    c.style.display = c.textContent.toLowerCase().includes(q) ? '' : 'none');
}

// ── DETAIL ──
function renderDetail(sid, tab) {
  currentDetailTab = tab;
  const s = state.students.find(x => x.id === sid);
  if (!s) return;
  const recs = state.records[sid] || [];

  let tabContent = '';
  if (tab === 'records') {
    tabContent = !recs.length
      ? '<div class="empty"><div class="icon">📝</div><p>尚未有課堂記錄<br>點擊右上角新增今日記錄</p></div>'
      : [...recs].reverse().map(r => `
          <div class="rec-item">
            <div class="rec-date">${r.date}</div>
            <div class="rec-body">${r.content}</div>
            ${r.homework ? `<div style="margin-top:8px;font-size:.8rem"><span style="color:var(--accent)">📌 功課：</span>${r.homework}</div>` : ''}
            <span class="tag">${'⭐'.repeat(parseInt(r.rating)||3)} ${RATING_LABEL[r.rating]||''}</span>
          </div>`).join('');
  } else {
    tabContent = `
      <div class="rec-item">
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:14px">
          <div><div style="font-size:.72rem;color:var(--muted)">樂器</div><div style="font-size:.92rem;font-weight:600;margin-top:3px">${s.instrument}</div></div>
          <div><div style="font-size:.72rem;color:var(--muted)">程度</div><div style="font-size:.92rem;font-weight:600;margin-top:3px">${s.level}</div></div>
          <div><div style="font-size:.72rem;color:var(--muted)">上課時間</div><div style="font-size:.92rem;font-weight:600;margin-top:3px">${s.time||'未設定'}</div></div>
          <div><div style="font-size:.72rem;color:var(--muted)">堂數</div><div style="font-size:.92rem;font-weight:600;margin-top:3px">${recs.length} 堂</div></div>
        </div>
        ${s.note ? `<div style="margin-top:16px;padding-top:14px;border-top:1px solid var(--border);font-size:.83rem;color:var(--muted);line-height:1.7"><b style="color:var(--ink)">備註</b><br>${s.note}</div>` : ''}
      </div>
      <button class="danger-btn" onclick="deleteStudent('${sid}')">刪除此學生及所有記錄</button>`;
  }

  document.getElementById('detailContent').innerHTML = `
    <div class="d-header">
      <div class="d-avatar ${COLORS[s.instrument]||'c1'}">${s.name[0]}</div>
      <div>
        <div class="d-name">${s.name}</div>
        <div class="d-sub">${s.instrument} · ${s.level}</div>
      </div>
    </div>
    <div class="tab-row">
      <button class="tab-btn ${tab==='records'?'active':''}" onclick="renderDetail('${sid}','records')">課堂記錄</button>
      <button class="tab-btn ${tab==='info'?'active':''}" onclick="renderDetail('${sid}','info')">學生資料</button>
    </div>
    ${tabContent}`;
}

// ── ADD STUDENT ──
function openAddStudent() { document.getElementById('modalStudent').classList.add('open'); }

async function addStudent() {
  const name = document.getElementById('sName').value.trim();
  if (!name) { alert('請輸入學生姓名'); return; }
  const btn = document.getElementById('btnStudent');
  btn.disabled = true; btn.textContent = '儲存中...';

  const s = {
    id: Date.now().toString(),
    name,
    instrument: document.getElementById('sInstrument').value,
    time: document.getElementById('sTime').value.trim(),
    level: document.getElementById('sLevel').value,
    note: document.getElementById('sNote').value.trim(),
    createdAt: Date.now()
  };

  // Optimistic local update
  state.students.push(s);
  state.records[s.id] = [];
  saveLocal(); renderAll();

  await fbSet('students', s.id, s);

  closeModal('modalStudent');
  ['sName','sTime','sNote'].forEach(id => document.getElementById(id).value = '');
  btn.disabled = false; btn.textContent = '儲存學生';
  showBanner('✅ 學生已新增！', false);
}

// ── ADD RECORD ──
function openAddRecord() {
  const s = state.students.find(x => x.id === currentStudentId);
  document.getElementById('recordModalTitle').textContent = s ? `${s.name} · 課堂記錄` : '新增課堂記錄';
  document.getElementById('modalRecord').classList.add('open');
}

async function addRecord() {
  const content = document.getElementById('rContent').value.trim();
  if (!content) { alert('請輸入學習內容'); return; }
  const btn = document.getElementById('btnRecord');
  btn.disabled = true; btn.textContent = '儲存中...';

  const r = {
    id: Date.now().toString(),
    studentId: currentStudentId,
    date: new Date().toLocaleDateString('zh-HK'),
    createdAt: Date.now(),
    content,
    rating: document.getElementById('rRating').value,
    homework: document.getElementById('rHomework').value.trim()
  };

  if (!state.records[currentStudentId]) state.records[currentStudentId] = [];
  state.records[currentStudentId].push(r);
  saveLocal();

  await fbSet('records', r.id, r);

  closeModal('modalRecord');
  document.getElementById('rContent').value = '';
  document.getElementById('rHomework').value = '';
  btn.disabled = false; btn.textContent = '儲存記錄';
  renderDetail(currentStudentId, currentDetailTab);
  renderDashboard();
  showBanner('✅ 記錄已儲存！', false);
}

// ── DELETE STUDENT ──
async function deleteStudent(sid) {
  if (!confirm('確定刪除此學生？所有課堂記錄將一併刪除，此動作不可撤銷。')) return;

  const recs = state.records[sid] || [];
  for (const r of recs) await fbDel('records', r.id);
  await fbDel('students', sid);

  state.students = state.students.filter(s => s.id !== sid);
  delete state.records[sid];
  saveLocal();

  showPage('students', document.querySelectorAll('nav button')[1], '學生管理', true);
  renderAll();
}

// ── EXPORT / CLEAR ──
function exportData() {
  const blob = new Blob([JSON.stringify(state, null, 2)], { type:'application/json' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = '履音備份_' + new Date().toLocaleDateString('zh-HK').replace(/\//g,'-') + '.json';
  a.click();
}

function confirmClear() {
  if (confirm('清除本機快取？Firebase 上的資料不受影響，重新整理後會自動重新下載。')) {
    localStorage.removeItem('mta_wm');
    location.reload();
  }
}

// ── MODAL ──
function closeModal(id, e) {
  if (e && e.target !== document.getElementById(id)) return;
  document.getElementById(id).classList.remove('open');
}
</script>
