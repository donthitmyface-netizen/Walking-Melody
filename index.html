<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="履音">
<title>履音 · 教學手記</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@300;400;600;700&family=Noto+Sans+TC:wght@300;400;500&display=swap" rel="stylesheet">
<script type="module">

import { getAuth,GoogleAuthProvider,signInWithPopup,signOut,onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
const cfg={apiKey:"AIzaSyCNonPT0mdrzI9p8Qlh-iKbkqpJciJ64lQ",authDomain:"walking-melody.firebaseapp.com",projectId:"walking-melody",storageBucket:"walking-melody.firebasestorage.app",messagingSenderId:"906826621436",appId:"1:906826621436:web:96850e4bff2d470c7e5279"};
const app=initializeApp(cfg);
window._db=getFirestore(app);window._auth=getAuth(app);
window._fb={collection,doc,setDoc,deleteDoc,onSnapshot,query,where,GoogleAuthProvider,signInWithPopup,signOut,onAuthStateChanged};
window.addEventListener('DOMContentLoaded',()=>window._init());
</script>
<style>
:root{
  --ink:#1c1408;--ink2:#2a1e0e;--ink3:#3a2c18;
  --paper:#f7f0e3;--paper2:#ede4d0;--silk:#faf6ee;
  --vermil:#9b2a1a;--vermil2:#c0392b;
  --gold:#b8922a;--gold2:#d4ac45;--gold3:#f0c860;
  --jade:#3d6b5a;--jade2:#2d5244;
  --muted:#7a6a52;--border:#d4c4a8;--border2:#c8b898;
  --sh:rgba(28,20,8,.1);--sh2:rgba(28,20,8,.18);
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{font-family:'Noto Sans TC',sans-serif;background:var(--paper);color:var(--ink);min-height:100vh;overflow-x:hidden}

/* ══ SPLASH ══ */
#splash{position:fixed;inset:0;z-index:999;background:var(--ink);display:flex;flex-direction:column;align-items:center;justify-content:center;transition:opacity .8s;background-image:radial-gradient(ellipse at 30% 40%,rgba(184,146,42,.07) 0%,transparent 55%)}
.sp-seal{width:86px;height:86px;border:2px solid var(--vermil);display:flex;align-items:center;justify-content:center;position:relative;margin-bottom:20px;animation:spA 2.5s ease infinite}
.sp-seal::before,.sp-seal::after{content:'';position:absolute;border:1px solid rgba(184,146,42,.15)}
.sp-seal::before{inset:5px}.sp-seal::after{inset:-5px}
@keyframes spA{0%,100%{opacity:1}50%{opacity:.55}}
.sp-char{font-family:'Noto Serif TC',serif;font-size:2.4rem;color:var(--vermil);font-weight:700}
.sp-t{font-family:'Noto Serif TC',serif;font-size:1rem;color:var(--gold2);letter-spacing:.55em;margin-bottom:4px}
.sp-s{font-size:.68rem;color:rgba(184,146,42,.38);letter-spacing:.28em;margin-bottom:24px}
.sp-line{width:1px;height:30px;background:linear-gradient(to bottom,var(--gold),transparent)}
.sp-msg{font-size:.67rem;color:rgba(184,146,42,.38);margin-top:10px;letter-spacing:.1em}

/* ══ LOGIN ══ */
#loginScreen{display:none;position:fixed;inset:0;z-index:500;background:var(--ink);flex-direction:column;align-items:center;justify-content:center;background-image:radial-gradient(ellipse at 30% 40%,rgba(184,146,42,.07) 0%,transparent 55%)}
#loginScreen.show{display:flex}
.g-btn{display:flex;align-items:center;gap:12px;background:var(--silk);border:1px solid var(--border);padding:13px 24px;cursor:pointer;font-family:'Noto Serif TC',serif;font-size:.9rem;color:var(--ink);letter-spacing:.1em;box-shadow:0 2px 14px rgba(0,0,0,.35);transition:.15s}
.g-btn:active{opacity:.8}
.g-btn svg{width:19px;height:19px;flex-shrink:0}
.login-note{font-size:.63rem;color:rgba(184,146,42,.32);margin-top:18px;letter-spacing:.1em;text-align:center;line-height:2.3}

/* ══ BANNER ══ */
#banner{position:fixed;top:0;left:0;right:0;z-index:300;background:var(--jade);color:#fff;font-size:.72rem;text-align:center;padding:7px;display:none;letter-spacing:.06em;z-index:301}
#banner.show{display:block}#banner.err{background:var(--vermil2)}

/* ══ HEADER ══ */
header{position:fixed;top:0;left:0;right:0;z-index:100;background:var(--ink);padding:env(safe-area-inset-top) 0 0;border-bottom:1px solid rgba(184,146,42,.18);box-shadow:0 2px 20px rgba(0,0,0,.45)}
.hi{display:flex;align-items:center;justify-content:space-between;padding:11px 14px}
.hl{display:flex;align-items:center;gap:9px}
.h-seal{width:28px;height:28px;border:1px solid var(--vermil);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.h-seal span{font-family:'Noto Serif TC',serif;font-size:.85rem;color:var(--vermil);font-weight:700}
.h-title{font-family:'Noto Serif TC',serif;font-size:.97rem;color:var(--gold2);letter-spacing:.2em}
.hr2{display:flex;align-items:center;gap:8px}
.hbtn{background:none;border:1px solid rgba(184,146,42,.38);cursor:pointer;color:var(--gold2);font-size:.75rem;font-family:'Noto Sans TC',sans-serif;padding:4px 9px;letter-spacing:.05em}
.sd{width:7px;height:7px;border-radius:50%;background:#444;flex-shrink:0;transition:.3s}
.sd.on{background:var(--jade);box-shadow:0 0 5px var(--jade)}
.sd.sy{background:var(--gold);animation:sdP 1s infinite}
.sd.er{background:#b54040}
@keyframes sdP{0%,100%{opacity:1}50%{opacity:.25}}
.uav{width:25px;height:25px;border-radius:50%;border:1px solid rgba(184,146,42,.38);object-fit:cover;cursor:pointer}

/* ══ NAV ══ */
nav{position:fixed;bottom:0;left:0;right:0;z-index:100;background:var(--ink);border-top:1px solid rgba(184,146,42,.18);display:flex;padding-bottom:env(safe-area-inset-bottom);box-shadow:0 -2px 18px rgba(0,0,0,.35)}
nav button{flex:1;border:none;background:none;padding:10px 2px 8px;display:flex;flex-direction:column;align-items:center;gap:2px;color:rgba(184,146,42,.28);cursor:pointer;font-family:'Noto Sans TC',sans-serif;position:relative;transition:.2s}
nav button.active{color:var(--gold2)}
nav button.active::after{content:'';position:absolute;bottom:0;left:18%;right:18%;height:1px;background:var(--vermil)}
nav button svg{width:19px;height:19px}
nav button span{font-size:.55rem;letter-spacing:.06em}

/* ══ MAIN ══ */
main{padding-top:62px;padding-bottom:70px;min-height:100vh}
.page{display:none;animation:pgIn .28s ease}.page.active{display:block}
@keyframes pgIn{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:none}}
.pad{padding:14px}

/* ══ SECTION TITLE ══ */
.st{font-family:'Noto Serif TC',serif;font-size:.81rem;letter-spacing:.2em;color:var(--muted);margin-bottom:10px;display:flex;align-items:center;gap:8px}
.st::before{content:'';width:3px;height:12px;background:var(--vermil);flex-shrink:0}
.st::after{content:'';flex:1;height:1px;background:var(--border)}
.st.jade::before{background:var(--jade)}
.st.gold::before{background:var(--gold)}

/* ══ STAT CARDS ══ */
.srow{display:grid;gap:7px;margin-bottom:16px}
.srow.c2{grid-template-columns:1fr 1fr}
.srow.c3{grid-template-columns:1fr 1fr 1fr}
.srow.c4{grid-template-columns:1fr 1fr 1fr 1fr}
.sc{background:var(--ink2);border:1px solid rgba(184,146,42,.18);padding:12px 7px;text-align:center;position:relative;overflow:hidden}
.sc::after{content:'';position:absolute;bottom:0;left:15%;right:15%;height:1px;background:linear-gradient(to right,transparent,var(--gold),transparent)}
.sc-n{font-family:'Noto Serif TC',serif;font-size:1.6rem;font-weight:700;color:var(--gold2);line-height:1.1}
.sc-l{font-size:.56rem;color:rgba(184,146,42,.42);margin-top:3px;letter-spacing:.1em}

/* ══ GENERIC CARD ══ */
.card{background:var(--silk);border:1px solid var(--border);padding:12px 13px;margin-bottom:8px;border-left:3px solid var(--vermil);box-shadow:1px 2px 5px var(--sh)}
.card.jade{border-left-color:var(--jade)}.card.gold{border-left-color:var(--gold)}.card.grey{border-left-color:var(--border2)}
.card:active{opacity:.75}

/* ══ CHIPS / FILTERS ══ */
.chips{display:flex;gap:6px;overflow-x:auto;padding-bottom:4px;margin-bottom:12px;scrollbar-width:none}
.chips::-webkit-scrollbar{display:none}
.chip{border:1px solid var(--border2);background:var(--silk);padding:4px 11px;font-size:.7rem;cursor:pointer;white-space:nowrap;font-family:'Noto Serif TC',serif;color:var(--muted);letter-spacing:.05em;flex-shrink:0;transition:.15s}
.chip.active{background:var(--ink);color:var(--gold2);border-color:var(--gold)}

/* ══ STUDENT CARD ══ */
.stu-card{background:var(--silk);border:1px solid var(--border);overflow:hidden;cursor:pointer;margin-bottom:8px;box-shadow:2px 2px 7px var(--sh);transition:.15s}
.stu-card:active{opacity:.7}
.stu-top{padding:12px 13px;display:flex;align-items:center;gap:11px}
.av{width:40px;height:40px;border:1px solid var(--border2);display:flex;align-items:center;justify-content:center;font-family:'Noto Serif TC',serif;font-size:1rem;font-weight:700;flex-shrink:0;background:var(--paper2);color:var(--ink);position:relative}
.sn{font-family:'Noto Serif TC',serif;font-size:.88rem;font-weight:600;letter-spacing:.05em}
.sm{font-size:.67rem;color:var(--muted);margin-top:2px}
.sbadge{font-size:.57rem;padding:1px 6px;background:var(--ink);color:var(--gold2);letter-spacing:.07em;font-family:'Noto Serif TC',serif;display:inline-block;margin-top:2px}
.prog-wrap{padding:0 13px 10px}
.prog-lbl{display:flex;justify-content:space-between;font-size:.63rem;color:var(--muted);margin-bottom:4px;letter-spacing:.04em}
.prog-track{height:3px;background:var(--border)}
.prog-fill{height:100%;background:linear-gradient(to right,var(--vermil),var(--gold));transition:.5s}

/* ══ DETAIL HEADER ══ */
.dh{background:var(--ink2);border:1px solid rgba(184,146,42,.18);padding:15px 14px;display:flex;align-items:center;gap:12px;margin-bottom:0;position:relative}
.dh::after{content:'';position:absolute;bottom:0;left:0;right:0;height:1px;background:linear-gradient(to right,transparent,var(--gold),transparent)}
.dav{width:50px;height:50px;border:1px solid rgba(184,146,42,.32);background:var(--ink);display:flex;align-items:center;justify-content:center;font-family:'Noto Serif TC',serif;font-size:1.3rem;color:var(--gold2);flex-shrink:0}
.dn{font-family:'Noto Serif TC',serif;font-size:1.1rem;color:var(--gold2);letter-spacing:.1em}
.ds{font-size:.68rem;color:rgba(184,146,42,.5);margin-top:3px;letter-spacing:.05em}
.dsch{font-size:.62rem;color:var(--vermil);margin-top:3px;letter-spacing:.07em}

/* ══ TABS ══ */
.tabs{display:flex;border-bottom:1px solid var(--border);overflow-x:auto;scrollbar-width:none;background:var(--silk)}
.tabs::-webkit-scrollbar{display:none}
.tb{border:none;background:none;padding:9px 14px;font-size:.71rem;cursor:pointer;font-family:'Noto Serif TC',serif;color:var(--muted);letter-spacing:.08em;border-bottom:2px solid transparent;margin-bottom:-1px;white-space:nowrap;flex-shrink:0;transition:.15s}
.tb.active{color:var(--vermil);border-bottom-color:var(--vermil)}

/* ══ RECORD ITEM ══ */
.ri{background:var(--silk);border:1px solid var(--border);border-left:3px solid var(--border2);padding:11px;margin-bottom:7px;box-shadow:1px 2px 5px var(--sh)}
.ri.present{border-left-color:var(--jade)}
.ri.absent{border-left-color:var(--vermil)}
.ri.makeup{border-left-color:var(--gold)}
.rd{font-size:.63rem;color:var(--muted);letter-spacing:.07em}
.rb{font-size:.83rem;line-height:1.72;margin:4px 0}
.rtag{display:inline-flex;align-items:center;gap:4px;font-size:.61rem;padding:2px 7px;background:var(--ink);color:var(--gold2);letter-spacing:.07em;margin-top:6px}
.att-pill{display:inline-block;font-size:.6rem;padding:1px 7px;margin-left:6px;vertical-align:middle}
.att-pill.present{background:var(--jade);color:#fff}
.att-pill.absent{background:var(--vermil);color:#fff}
.att-pill.makeup{background:var(--gold);color:var(--ink)}

/* ══ ATTENDANCE VISUAL ══ */
.att-heatmap{display:grid;grid-template-columns:repeat(10,1fr);gap:4px;margin:10px 0 14px}
.att-dot{width:100%;aspect-ratio:1;border-radius:2px;display:flex;align-items:center;justify-content:center;font-size:.55rem;font-weight:700;cursor:default;border:1px solid transparent;transition:.15s}
.att-dot.present{background:var(--jade);color:#fff;border-color:var(--jade2)}
.att-dot.absent{background:var(--vermil);color:#fff;border-color:#7a2010}
.att-dot.makeup{background:var(--gold);color:var(--ink);border-color:var(--gold)}
.att-dot.empty{background:var(--border);border-color:var(--border2);color:var(--muted)}
.att-legend{display:flex;gap:12px;margin-bottom:10px;flex-wrap:wrap}
.att-leg{display:flex;align-items:center;gap:5px;font-size:.65rem;color:var(--muted)}
.att-leg-dot{width:10px;height:10px;border-radius:2px}

/* ══ FEE PROGRESS ══ */
.fee-meter{background:var(--ink2);border:1px solid rgba(184,146,42,.18);padding:14px;margin-bottom:10px}
.fee-track{height:10px;background:rgba(255,255,255,.08);margin:8px 0 5px;border-radius:1px;overflow:hidden;position:relative}
.fee-fill{height:100%;background:linear-gradient(to right,var(--jade),var(--gold2));transition:.7s;position:relative}
.fee-fill::after{content:'';position:absolute;right:0;top:0;bottom:0;width:2px;background:#fff;opacity:.5}

/* ══ CALENDAR / TIMETABLE ══ */
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:2px;margin-bottom:14px}
.cal-hd{text-align:center;font-size:.62rem;color:var(--muted);padding:5px 0;font-family:'Noto Serif TC',serif;letter-spacing:.05em}
.cal-day{aspect-ratio:.8;display:flex;flex-direction:column;align-items:center;padding:3px 2px;position:relative;cursor:pointer;border:1px solid transparent;transition:.15s;min-height:36px}
.cal-day:hover{background:rgba(184,146,42,.05);border-color:var(--border)}
.cal-day.today{border-color:var(--vermil);background:rgba(155,42,26,.06)}
.cal-day.has-lesson{background:rgba(61,107,90,.1);border-color:rgba(61,107,90,.3)}
.cal-day.other-month{opacity:.35}
.cal-num{font-size:.72rem;font-family:'Noto Serif TC',serif;margin-bottom:2px;color:var(--ink)}
.cal-day.today .cal-num{color:var(--vermil);font-weight:700}
.cal-dot{width:4px;height:4px;border-radius:50%;margin:1px auto}
.cal-dot.jade{background:var(--jade)}.cal-dot.vermil{background:var(--vermil)}.cal-dot.gold{background:var(--gold)}
.week-row{background:var(--silk);border:1px solid var(--border);margin-bottom:6px;overflow:hidden}
.week-row-hd{background:var(--ink2);padding:8px 12px;display:flex;align-items:center;justify-content:space-between;cursor:pointer}
.week-row-hd span{font-family:'Noto Serif TC',serif;font-size:.8rem;color:var(--gold2);letter-spacing:.08em}
.week-slot{padding:9px 12px;border-top:1px solid var(--border);display:flex;align-items:center;gap:10px;cursor:pointer}
.week-slot:active{opacity:.7}
.week-time{font-family:'Noto Serif TC',serif;font-size:.8rem;color:var(--gold);min-width:44px}
.week-dur{font-size:.62rem;padding:1px 6px;background:var(--jade);color:#fff;border-radius:1px;flex-shrink:0}

/* ══ EXAM DB ══ */
.exam-card{background:var(--silk);border:1px solid var(--border);margin-bottom:10px;overflow:hidden}
.exam-hd{padding:12px 14px;display:flex;align-items:center;gap:10px;cursor:pointer;background:var(--ink2)}
.exam-hd-accent{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.exam-title{font-family:'Noto Serif TC',serif;font-size:.88rem;color:var(--gold2);flex:1;letter-spacing:.05em}
.exam-body{padding:13px 14px;display:none;border-top:1px solid rgba(184,146,42,.15)}
.exam-body.open{display:block}
.exam-row{display:flex;gap:8px;padding:6px 0;border-bottom:1px dashed var(--border2)}
.exam-row:last-of-type{border-bottom:none}
.exam-key{font-size:.68rem;color:var(--muted);flex-shrink:0;width:76px;padding-top:1px;letter-spacing:.04em}
.exam-val{font-size:.78rem;line-height:1.6;flex:1;color:var(--ink)}
.exam-url{display:inline-flex;align-items:center;gap:5px;margin-top:9px;color:var(--vermil);font-size:.71rem;text-decoration:none;border:1px solid rgba(155,42,26,.3);padding:4px 10px;letter-spacing:.04em}

/* ══ FINANCE TABLE ══ */
.fin-total{background:var(--ink2);border:1px solid rgba(184,146,42,.2);padding:12px 14px;display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.fin-total-lbl{font-family:'Noto Serif TC',serif;font-size:.82rem;color:var(--gold2);letter-spacing:.05em}
.fin-total-amt{font-family:'Noto Serif TC',serif;font-size:1.3rem;color:var(--gold2);font-weight:700}
.fin-table{width:100%;border-collapse:collapse;font-size:.75rem;margin-bottom:10px}
.fin-table th{background:var(--ink2);color:var(--gold2);padding:7px 8px;text-align:left;font-family:'Noto Serif TC',serif;font-weight:400;letter-spacing:.05em;font-size:.72rem}
.fin-table td{padding:8px;border-bottom:1px solid var(--border);background:var(--silk);vertical-align:middle}
.fin-table tr:last-child td{border-bottom:none}
.fin-income{color:var(--jade);font-weight:600}

/* ══ REFERENCE SECTION ══ */
.ref-card{background:var(--silk);border:1px solid var(--border);margin-bottom:9px}
.ref-hd{background:var(--ink2);padding:11px 13px;display:flex;align-items:center;gap:9px;cursor:pointer}
.ref-title{font-family:'Noto Serif TC',serif;font-size:.86rem;color:var(--gold2);flex:1;letter-spacing:.05em}
.ref-body{padding:12px 13px;display:none;font-size:.79rem;line-height:1.75;color:var(--ink)}
.ref-body.open{display:block}
.ref-body ul{margin-left:14px;margin-top:6px}
.ref-body li{margin-bottom:4px}
.ref-body b{color:var(--vermil);font-weight:600}
.ref-body .sub{color:var(--muted);font-size:.73rem}

/* ══ TAG GRID ══ */
.tag-grid{display:flex;flex-wrap:wrap;gap:5px;margin:6px 0 10px}
.tg{border:1px solid var(--border2);padding:4px 9px;font-size:.7rem;cursor:pointer;color:var(--muted);letter-spacing:.04em;user-select:none;transition:.15s}
.tg.on{background:var(--jade);color:#fff;border-color:var(--jade2)}

/* ══ SEARCH ══ */
.isrch{display:flex;align-items:center;gap:8px;border:1px solid var(--border2);background:var(--silk);padding:7px 11px;margin-bottom:12px;box-shadow:inset 1px 1px 3px rgba(0,0,0,.04)}
.isrch input{flex:1;border:none;background:none;font-size:.83rem;color:var(--ink);font-family:'Noto Sans TC',sans-serif;outline:none}
.isrch input::placeholder{color:var(--muted)}

/* ══ MONTH NAV ══ */
.mnav{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;gap:8px}
.mnav-btn{background:none;border:1px solid var(--border2);color:var(--muted);padding:4px 11px;cursor:pointer;font-size:.8rem;font-family:'Noto Serif TC',serif;flex-shrink:0}
.mnav-label{font-family:'Noto Serif TC',serif;font-size:.9rem;color:var(--ink);letter-spacing:.12em;flex:1;text-align:center}

/* ══ SETTINGS ══ */
.stb{background:var(--silk);border:1px solid var(--border);padding:12px 13px;margin-bottom:7px}
.stl{font-family:'Noto Serif TC',serif;font-size:.83rem;margin-bottom:2px;letter-spacing:.04em}
.sts{font-size:.68rem;color:var(--muted)}
.dbtn{width:100%;background:none;border:1px solid rgba(155,42,26,.38);color:var(--vermil);padding:10px;font-size:.8rem;cursor:pointer;font-family:'Noto Serif TC',sans-serif;margin-top:7px;letter-spacing:.05em}

/* ══ USER PANEL ══ */
.up{background:var(--ink2);border:1px solid rgba(184,146,42,.18);padding:13px;display:flex;align-items:center;gap:11px;margin-bottom:14px}
.up img{width:42px;height:42px;border-radius:50%;border:1px solid rgba(184,146,42,.3);object-fit:cover}
.up-n{font-family:'Noto Serif TC',serif;font-size:.88rem;color:var(--gold2);letter-spacing:.05em}
.up-e{font-size:.65rem;color:rgba(184,146,42,.42);margin-top:2px}
.sob{background:none;border:1px solid rgba(155,42,26,.38);color:var(--vermil);padding:5px 10px;font-size:.7rem;cursor:pointer;font-family:'Noto Serif TC',sans-serif;white-space:nowrap}

/* ══ MODALS ══ */
.ov{display:none;position:fixed;inset:0;z-index:200;background:rgba(8,4,1,.75);backdrop-filter:blur(3px)}
.ov.open{display:flex;align-items:flex-end}
.mo{background:var(--paper);width:100%;padding:16px 16px calc(16px + env(safe-area-inset-bottom));animation:moUp .3s cubic-bezier(.32,1.15,.54,1);max-height:90vh;overflow-y:auto;border-top:2px solid rgba(184,146,42,.28);box-shadow:0 -4px 28px rgba(0,0,0,.45)}
@keyframes moUp{from{transform:translateY(100%)}to{transform:none}}
.mg{width:30px;height:3px;background:var(--border2);margin:0 auto 14px;border-radius:2px}
.mt{font-family:'Noto Serif TC',serif;font-size:.98rem;margin-bottom:12px;letter-spacing:.1em;display:flex;align-items:center;gap:7px}
.mt::before{content:'';width:3px;height:14px;background:var(--vermil);flex-shrink:0}
.il{display:block;font-size:.69rem;color:var(--muted);margin-bottom:3px;margin-top:8px;letter-spacing:.05em}
.ii,.is,.ita{width:100%;border:1px solid var(--border2);background:var(--silk);padding:9px 10px;font-size:.84rem;color:var(--ink);margin-bottom:2px;font-family:'Noto Sans TC',sans-serif;outline:none;-webkit-appearance:auto;appearance:auto}
.ita{height:90px;resize:none;line-height:1.7}
.mb{width:100%;background:var(--ink);color:var(--gold2);border:1px solid rgba(184,146,42,.28);padding:13px;font-size:.87rem;font-weight:600;cursor:pointer;margin-top:9px;font-family:'Noto Serif TC',serif;letter-spacing:.14em;transition:.15s}
.mb:active{background:var(--ink2)}.mb:disabled{opacity:.38;cursor:not-allowed}
.mb.sec{background:transparent;color:var(--muted);border-color:var(--border);margin-top:4px}

/* ══ EMPTY STATE ══ */
.empty{text-align:center;padding:38px 18px;color:var(--muted)}
.empty .ec{font-family:'Noto Serif TC',serif;font-size:2.5rem;color:var(--border2);margin-bottom:8px}
.empty p{font-size:.78rem;line-height:1.85;letter-spacing:.05em}

/* ══ GCAL BUTTON ══ */
.gcal-btn{display:flex;align-items:center;justify-content:center;gap:8px;background:none;border:1px solid rgba(66,133,244,.5);color:#4285F4;padding:8px 14px;font-size:.76rem;cursor:pointer;font-family:'Noto Sans TC',sans-serif;letter-spacing:.04em;width:100%;margin-top:6px}
.gcal-btn svg{width:14px;height:14px;flex-shrink:0}

/* ══ MISC ══ */
.divider{border:none;border-top:1px solid var(--border);margin:12px 0}
.piece-item{display:flex;align-items:baseline;gap:6px;padding:5px 0;border-bottom:1px dashed var(--border2);font-size:.82rem}
.piece-item:last-child{border-bottom:none}
.piece-num{font-family:'Noto Serif TC',serif;color:var(--vermil);font-size:.75rem;min-width:16px}
.inline-edit{background:var(--silk);border:1px solid var(--border);padding:10px;font-size:.82rem;line-height:1.7;cursor:text;min-height:56px;color:var(--ink)}
.inline-edit:empty::before{content:attr(data-placeholder);color:var(--muted)}
[contenteditable]:focus{outline:1px solid var(--gold);background:var(--paper)}
</style>
</head><body>

// APP STATE
// ══════════════════════════════════════════════
let state = { schools:[], students:[], lessons:[], records:[], payments:[] };
let CU = null; // current user
let CSD = null; // current student detail id
let CDT = 'records'; // current detail tab
let CP = 'dashboard'; // current page
let selSchool = 'all';
let unsubFns = [];
let calDate = new Date();
let finDate = new Date();
let examCat = '全部';

function uid() { return CU ? CU.uid : null; }
function cKey() { return 'luyin_v4_' + (uid() || 'anon'); }
function loadL() { try { const s = localStorage.getItem(cKey()); if (s) { const p = JSON.parse(s); Object.keys(state).forEach(k => { if (p[k]) state[k] = p[k]; }); } } catch(e) {} }
function saveL() { try { localStorage.setItem(cKey(), JSON.stringify(state)); } catch(e) {} }

// ══════════════════════════════════════════════
// INIT & AUTH
// ══════════════════════════════════════════════
window._init = function() {
  const { onAuthStateChanged } = window._fb;
  let sDone = false;
  const dis = msg => { if (sDone) return; sDone = true; if (msg) document.getElementById('spMsg').textContent = msg; setTimeout(() => { const el = document.getElementById('splash'); if (el) { el.style.opacity = '0'; setTimeout(() => el.remove(), 700); } }, 400); };
  setTimeout(() => dis(''), 3500);
  onAuthStateChanged(window._auth, u => { dis(''); if (u) { CU = u; showApp(u); } else { CU = null; showLogin(); } });
};

async function doLogin() {
  const { GoogleAuthProvider, signInWithPopup } = window._fb;
  try { await signInWithPopup(window._auth, new GoogleAuthProvider()); }
  catch(e) { if (e.code !== 'auth/popup-closed-by-user') alert('登入失敗：' + e.message); }
}
async function doSignOut() {
  if (!confirm('確定登出？')) return;
  unsubFns.forEach(f => f()); unsubFns = [];
  state = { schools:[], students:[], lessons:[], records:[], payments:[] };
  await window._fb.signOut(window._auth);
}

function showLogin() {
  document.getElementById('loginScreen').classList.add('show');
  document.getElementById('mainApp').style.display = 'none';
  document.getElementById('mainNav').style.display = 'none';
  document.getElementById('hAction').style.display = 'none';
  document.getElementById('uAv').style.display = 'none';
  setSS('er');
}
function showApp(u) {
  document.getElementById('loginScreen').classList.remove('show');
  document.getElementById('mainApp').style.display = 'block';
  document.getElementById('mainNav').style.display = 'flex';
  document.getElementById('hAction').style.display = 'block';
  const av = document.getElementById('uAv');
  if (u.photoURL) { av.src = u.photoURL; av.style.display = 'block'; }
  document.getElementById('userPanel').innerHTML = `<div class="up">${u.photoURL ? `<img src="${u.photoURL}" alt="">` : `<div style="width:42px;height:42px;background:var(--ink2);border:1px solid rgba(184,146,42,.28);display:flex;align-items:center;justify-content:center;font-family:'Noto Serif TC',serif;color:var(--gold2);font-size:1.2rem">${(u.displayName||'?')[0]}</div>`}<div style="flex:1"><div class="up-n">${u.displayName||'老師'}</div><div class="up-e">${u.email}</div></div><button class="sob" onclick="doSignOut()">登出</button></div>`;
  loadL(); startSync(u.uid);
  renderRef();
}

// ══════════════════════════════════════════════
// FIREBASE SYNC
// ══════════════════════════════════════════════
function startSync(userId) {
  unsubFns.forEach(f => f()); unsubFns = [];
  const db = window._db, { collection, query, where, onSnapshot } = window._fb;
  setSS('sy');
  ['schools','students','lessons','records','payments'].forEach(col => {
    const u = onSnapshot(
      query(collection(db, col), where('uid', '==', userId)),
      snap => { state[col] = snap.docs.map(d => ({ id: d.id, ...d.data() })); if (col === 'records') state.records.sort((a,b) => (a.createdAt||0)-(b.createdAt||0)); saveL(); renderAll(); setSS('on'); },
      err => { console.error(col, err); setSS('er'); renderAll(); }
    );
    unsubFns.push(u);
  });
}
async function fbSet(col, id, data) {
  const { doc, setDoc } = window._fb;
  try { await setDoc(doc(window._db, col, id), { ...data, uid: uid() }); }
  catch(e) { showBan('儲存失敗：' + e.message, true); }
}
async function fbDel(col, id) {
  const { doc, deleteDoc } = window._fb;
  try { await deleteDoc(doc(window._db, col, id)); } catch(e) { console.error(e); }
}
function setSS(s) {
  ['syncDot','syncDot2'].forEach(id => { const el = document.getElementById(id); if (!el) return; el.className = 'sd' + (s==='on'?' on':s==='sy'?' sy':s==='er'?' er':''); });
  const t = document.getElementById('syncTxt'); if (t) t.textContent = s==='on'?'已連接 · 即時同步 ✓':s==='sy'?'連接中⋯':'未連接';
}
function showBan(msg, isErr) { const b = document.getElementById('banner'); b.textContent = msg; b.className = 'show' + (isErr ? ' err' : ''); setTimeout(() => b.className = '', 4000); }

// ══════════════════════════════════════════════
// NAVIGATION
// ══════════════════════════════════════════════
function showPage(id, btn, title, showAdd) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.getElementById('page-' + id).classList.add('active');
  document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
  if (btn) btn.classList.add('active');
  document.getElementById('pgTitle').textContent = title;
  CP = id;
  document.getElementById('hAction').style.display = showAdd ? 'block' : 'none';
  if (id === 'timetable') renderCal();

// CALENDAR / TIMETABLE
// ══════════════════════════════════════════════
function renderCal() {
  const y = calDate.getFullYear(), m = calDate.getMonth();
  document.getElementById('calLabel').textContent = `${y} 年 ${m+1} 月`;
  const firstDay = new Date(y, m, 1);
  const lastDay = new Date(y, m+1, 0);
  const startDow = (firstDay.getDay() + 6) % 7; // Mon=0
  const today = new Date();
  let cells = '';
  for (let i = 0; i < startDow; i++) { const d = new Date(y, m, 1-startDow+i); cells += `<div class="cal-day other-month"><div class="cal-num">${d.getDate()}</div></div>`; }
  for (let d = 1; d <= lastDay.getDate(); d++) {
    const date = new Date(y, m, d);
    const dow = date.getDay();
    const lessons = state.lessons.filter(l => parseInt(l.day) === dow);
    const isToday = date.toDateString() === today.toDateString();
    const dots = lessons.slice(0,3).map(l => `<div class="cal-dot jade"></div>`).join('');
    cells += `<div class="cal-day${isToday?' today':''}${lessons.length?' has-lesson':''}" onclick="calDayClick(${d})"><div class="cal-num">${d}</div>${dots}</div>`;
  }
  const rem = (7 - (startDow + lastDay.getDate()) % 7) % 7;
  for (let i = 1; i <= rem; i++) cells += `<div class="cal-day other-month"><div class="cal-num">${i}</div></div>`;
  document.getElementById('calGrid').innerHTML = cells;
  // Week slots
  const weekDays = [
    {dow:1,label:'週一'},{dow:2,label:'週二'},{dow:3,label:'週三'},{dow:4,label:'週四'},{dow:5,label:'週五'},{dow:6,label:'週六'},{dow:0,label:'週日'}
  ];
  let wHtml = '';
  weekDays.forEach(wd => {
    const slots = state.lessons.filter(l => parseInt(l.day) === wd.dow).sort((a,b) => a.start.localeCompare(b.start));
    if (!slots.length) return;
    wHtml += `<div class="week-row"><div class="week-row-hd"><span>${wd.label}</span><span style="font-size:.65rem;color:rgba(184,146,42,.45)">${slots.length} 堂</span></div>`;
    slots.forEach(l => {
      const s = state.students.find(x => x.id === l.studentId);
      if (!s) return;
      const sch = state.schools.find(x => x.id === s.schoolId);
      const endH = parseInt(l.start.split(':')[0]) + Math.floor((parseInt(l.start.split(':')[1]) + parseInt(l.dur)) / 60);
      const endM = (parseInt(l.start.split(':')[1]) + parseInt(l.dur)) % 60;
      const endStr = String(endH).padStart(2,'0') + ':' + String(endM).padStart(2,'0');
      wHtml += `<div class="week-slot" onclick="showDetail('${s.id}')">
        <div class="week-time">${l.start}–${endStr}</div>
        <div class="week-dur">${l.dur}分</div>
        <div style="flex:1"><div style="font-family:'Noto Serif TC',serif;font-size:.86rem;font-weight:600">${s.name}</div><div style="font-size:.66rem;color:var(--muted)">${s.instrument}${sch?' · '+sch.name:''} · $${l.fee||'–'}</div></div>
        <button onclick="event.stopPropagation();addToGCal('${l.id}')" class="gcal-btn" style="width:auto;padding:4px 8px;font-size:.62rem;margin-top:0">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>+GCal
        </button>
        <button onclick="event.stopPropagation();delLesson('${l.id}')" style="background:none;border:none;color:var(--vermil);font-size:.7rem;cursor:pointer;padding:4px">刪</button>
      </div>`;
    });
    wHtml += '</div>';
  });
  document.getElementById('weekSlots').innerHTML = wHtml || '<div class="empty"><div class="ec">排</div><p>未有課堂安排<br>點擊右上角新增</p></div>';
}
function calPrev() { calDate.setMonth(calDate.getMonth()-1); renderCal(); }
function calNext() { calDate.setMonth(calDate.getMonth()+1); renderCal(); }
function calDayClick(d) { /* could show day view */ }

function addToGCal(lid) {
  const l = state.lessons.find(x => x.id === lid); if (!l) return;
  const s = state.students.find(x => x.id === l.studentId); if (!s) return;
  const d = new Date(); const dow = parseInt(l.day);
  const diff = (dow - d.getDay() + 7) % 7 || 7;
  const next = new Date(d); next.setDate(d.getDate() + diff);
  const [h,mi] = l.start.split(':').map(Number);
  next.setHours(h, mi, 0, 0);
  const end = new Date(next); end.setMinutes(end.getMinutes() + parseInt(l.dur));
  const fmt = dt => dt.toISOString().replace(/[-:]/g,'').split('.')[0]+'Z';
  const title = encodeURIComponent(`${s.name} 音樂課（${s.instrument}）`);
  const desc = encodeURIComponent(`老師: ${CU?CU.displayName:'老師'}\n學費: HK$${l.fee||'–'}`);
  const recur = encodeURIComponent('RRULE:FREQ=WEEKLY');
  const url = `https://calendar.google.com/calendar/render?action=TEMPLATE&text=${title}&dates=${fmt(next)}/${fmt(end)}&details=${desc}&recur=${recur}`;
  window.open(url, '_blank');
}

async function addLesson() {
  const sid = document.getElementById('lsStu').value; if (!sid) { alert('請選擇學生'); return; }
  const btn = document.getElementById('btnLesson'); btn.disabled = true; btn.textContent = '儲存中⋯';

  state.lessons.push(l); saveL(); await fbSet('lessons', l.id, l);
  closeMo('moLesson'); btn.disabled = false; btn.textContent = '儲存課堂';
  renderAll(); showBan('✓ 課堂已新增', false);
}

  }
  document.getElementById('detailBody').innerHTML = body;
}

let _saveTimer = {};
function saveField(sid, field, val) {
  clearTimeout(_saveTimer[field]);
  _saveTimer[field] = setTimeout(() => {
    const s = state.students.find(x => x.id === sid); if (!s) return;
    s[field] = val; saveL(); fbSet('students', sid, s);
  }, 1000);
}
async function toggleTrait(sid, trait) {
  const s = state.students.find(x => x.id === sid); if (!s) return;
  const tr = s.traits || [];
  s.traits = tr.includes(trait) ? tr.filter(t => t !== trait) : [...tr, trait];
  saveL(); await fbSet('students', sid, s); renderDetail(sid, 'profile');
}
function openPayForStudent(sid) {
  document.getElementById('payStudent').innerHTML = state.students.map(s=>`<option value="${s.id}"${s.id===sid?' selected':''}>${s.name}</option>`).join('');
  document.getElementById('payDate').value = new Date().toISOString().split('T')[0];
  openMo('moPayment');
}

// ══════════════════════════════════════════════
// FINANCE
// ══════════════════════════════════════════════
function renderFin() {
  const y = finDate.getFullYear(), m = finDate.getMonth();
  document.getElementById('finLabel').textContent = `${y} 年 ${m+1} 月`;
  const mPay = state.payments.filter(p => { const d = new Date(p.date); return d.getMonth()===m && d.getFullYear()===y; });
  const total = mPay.reduce((a,p) => a+parseFloat(p.amount||0), 0);
  // Year total
  const yPay = state.payments.filter(p => new Date(p.date).getFullYear()===y);
  const yTotal = yPay.reduce((a,p) => a+parseFloat(p.amount||0), 0);
  let html = `
    <div class="fin-total"><div><div class="fin-total-lbl">本月總收入</div><div style="font-size:.65rem;color:rgba(184,146,42,.42)">${y}年全年：HK$${yTotal.toLocaleString()}</div></div><div class="fin-total-amt">HK$ ${total.toLocaleString()}</div></div>
    <div class="srow c3" style="margin-bottom:14px">
      <div class="sc" style="padding:10px 6px"><div class="sc-n" style="font-size:1.2rem">${mPay.length}</div><div class="sc-l">收款筆數</div></div>
      <div class="sc" style="padding:10px 6px"><div class="sc-n" style="font-size:1rem">$${mPay.length?Math.round(total/mPay.length).toLocaleString():'–'}</div><div class="sc-l">平均每筆</div></div>
      <div class="sc" style="padding:10px 6px"><div class="sc-n" style="font-size:1rem">${new Set(mPay.map(p=>p.studentId)).size}</div><div class="sc-l">收費學生</div></div>
    </div>`;
  if (!mPay.length) { html += '<div class="empty"><div class="ec">帳</div><p>本月尚未有收款記錄<br>點擊右上角新增</p></div>'; }
  else {
    html += `<div class="st">本月收款明細</div><table class="fin-table"><tr><th>學生</th><th>金額</th><th>方式</th><th>日期</th></tr>`;
    [...mPay].sort((a,b)=>new Date(b.date)-new Date(a.date)).forEach(p => { const s = state.students.find(x=>x.id===p.studentId); html += `<tr><td>${s?s.name:'–'}</td><td class="fin-income">$${parseFloat(p.amount).toLocaleString()}</td><td>${p.method}</td><td>${p.date}</td></tr>`; });
    html += '</table>';
  }
  // Monthly chart (simple text bars)
  html += `<div class="st" style="margin-top:6px">過去6個月收入</div>`;
  for (let i = 5; i >= 0; i--) {
    const d = new Date(y, m-i, 1);
    const mv = state.payments.filter(p => { const pd=new Date(p.date); return pd.getMonth()===d.getMonth()&&pd.getFullYear()===d.getFullYear(); }).reduce((a,p)=>a+parseFloat(p.amount||0),0);
    const maxV = 10000;
    html += `<div style="display:flex;align-items:center;gap:8px;margin-bottom:6px"><div style="font-size:.65rem;color:var(--muted);min-width:32px;text-align:right;font-family:'Noto Serif TC',serif">${d.getMonth()+1}月</div><div style="flex:1;height:14px;background:var(--border);position:relative"><div style="height:100%;width:${Math.min(100,mv/maxV*100)}%;background:linear-gradient(to right,var(--jade),var(--gold2));transition:.4s"></div></div><div style="font-size:.68rem;color:var(--gold);min-width:55px;font-family:'Noto Serif TC',serif">$${mv.toLocaleString()}</div></div>`;
  }
  document.getElementById('finContent').innerHTML = html;
}
function finPrev() { finDate.setMonth(finDate.getMonth()-1); renderFin(); }
function finNext() { finDate.setMonth(finDate.getMonth()+1); renderFin(); }

// ══════════════════════════════════════════════
// EXAM DATABASE
// ══════════════════════════════════════════════
function renderExams() {
  const cats = ['全部', ...EXAM_DATA.map(e => e.cat)];
  document.getElementById('examChips').innerHTML = cats.map(c => `<div class="chip${examCat===c?' active':''}" onclick="selExamCat('${c}')">${c}</div>`).join('');
  const list = examCat==='全部' ? EXAM_DATA : EXAM_DATA.filter(e=>e.cat===examCat);
  document.getElementById('examList').innerHTML = list.map(e => `
    <div class="exam-card">
      <div class="exam-hd" onclick="toggleExam(this)">
        <div class="exam-hd-accent" style="background:${e.color}"></div>
        <div class="exam-title">${e.name}</div>
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="var(--muted)" stroke-width="1.5"><path d="m6 9 6 6 6-6"/></svg>
      </div>
      <div class="exam-body">
        <div style="font-size:.75rem;color:var(--muted);margin-bottom:10px;line-height:1.65">${e.desc}</div>
        ${e.items.map(i=>`<div class="exam-row"><span class="exam-key">${i.k}</span><span class="exam-val">${i.v.replace(/\n/g,'<br>')}</span></div>`).join('')}
        <a href="${e.url}" target="_blank" class="exam-url">前往官方網站 →</a>
      </div>
    </div>`).join('');
}
function selExamCat(cat) { examCat = cat; renderExams(); }
function toggleExam(hd) { hd.nextElementSibling.classList.toggle('open'); }

function toggleRef(hd) { hd.nextElementSibling.classList.toggle('open'); }

// ══════════════════════════════════════════════
// SCHOOL MANAGEMENT
// ══════════════════════════════════════════════
function renderSchMgmt() {
  const el = document.getElementById('schMgmt'); if (!el) return;
  if (!state.schools.length) { el.innerHTML = '<div style="font-size:.73rem;color:var(--muted);padding:4px 0;letter-spacing:.04em">尚未新增學校</div>'; return; }
  el.innerHTML = state.schools.map(s => `<div class="stb" style="display:flex;align-items:center;justify-content:space-between;margin-bottom:6px"><div class="stl">${s.name}</div><button onclick="delSchool('${s.id}')" style="background:none;border:none;color:var(--vermil);font-size:.72rem;cursor:pointer">刪除</button></div>`).join('');
}
async function addSchool() {
  const name = document.getElementById('schN').value.trim(); if (!name) { alert('請輸入學校名稱'); return; }
  const btn = document.getElementById('btnSch'); btn.disabled = true; btn.textContent = '新增中⋯';
  const s = { id: Date.now().toString(), name, createdAt: Date.now() };
  state.schools.push(s); saveL(); await fbSet('schools', s.id, s);
  closeMo('moSchool'); document.getElementById('schN').value = '';
  btn.disabled = false; btn.textContent = '新增學校';
  renderAll(); showBan('✓ 學校已新增', false);
}
async function delSchool(id) { if (!confirm('刪除此學校？')) return; await fbDel('schools', id); state.schools = state.schools.filter(s => s.id !== id); saveL(); renderAll(); }

// ══════════════════════════════════════════════
// ADD STUDENT
// ══════════════════════════════════════════════
async function addStudent() {
  const name = document.getElementById('sName').value.trim(); if (!name) { alert('請輸入學生姓名'); return; }
  const btn = document.getElementById('btnStudent'); btn.disabled = true; btn.textContent = '儲存中⋯';
  const s = { id: Date.now().toString(), name, nameEn: document.getElementById('sNameEn').value.trim(), dob: document.getElementById('sDob').value, schoolId: document.getElementById('sSchool').value, instrument: document.getElementById('sInst').value, level: document.getElementById('sLevel').value, parent: document.getElementById('sParent').value.trim(), phone: document.getElementById('sPhone').value.trim(), note: document.getElementById('sNote').value.trim(), traits: [], createdAt: Date.now() };
  state.students.push(s); saveL(); await fbSet('students', s.id, s);
  closeMo('moStudent'); ['sName','sNameEn','sDob','sParent','sPhone','sNote'].forEach(id => document.getElementById(id).value = '');
  btn.disabled = false; btn.textContent = '儲存學生';
  renderAll(); showBan('✓ 學生已新增', false);
}

// ADD RECORD
// ══════════════════════════════════════════════
async function addRecord() {
  const content = document.getElementById('rContent').value.trim(); if (!content) { alert('請輸入學習內容'); return; }

  const r = { id: Date.now().toString(), studentId: CSD, date: new Date().toLocaleDateString('zh-HK'), createdAt: Date.now(), content, attend: document.getElementById('rAttend').value, piece: document.getElementById('rPiece').value.trim(), rating: document.getElementById('rRating').value, hw: document.getElementById('rHw').value.trim() };

// ADD PAYMENT
// ══════════════════════════════════════════════
async function addPayment() {
  const amt = document.getElementById('payAmt').value; if (!amt) { alert('請輸入金額'); return; }
  const btn = document.getElementById('btnPay'); btn.disabled = true; btn.textContent = '記錄中⋯';
  const p = { id: Date.now().toString(), studentId: document.getElementById('payStudent').value, amount: parseFloat(amt), date: document.getElementById('payDate').value, period: document.getElementById('payPeriod').value, method: document.getElementById('payMethod').value, note: document.getElementById('payNote').value, createdAt: Date.now() };
  state.payments.push(p); saveL(); await fbSet('payments', p.id, p);
  closeMo('moPayment'); ['payAmt','payPeriod','payNote'].forEach(id => document.getElementById(id).value = '');
  btn.disabled = false; btn.textContent = '記錄收款';
  renderAll(); showBan('✓ 收款已記錄', false);
}

// ══════════════════════════════════════════════
// DELETE STUDENT
// ══════════════════════════════════════════════
async function deleteStudent(sid) {
  if (!confirm('確定刪除此學生？所有相關記錄、學費、課堂安排將一併刪除。')) return;
  for (const r of state.records.filter(r=>r.studentId===sid)) await fbDel('records', r.id);
  for (const p of state.payments.filter(p=>p.studentId===sid)) await fbDel('payments', p.id);
  for (const l of state.lessons.filter(l=>l.studentId===sid)) await fbDel('lessons', l.id);
  await fbDel('students', sid);
  ['records','payments','lessons'].forEach(k => state[k] = state[k].filter(x => x.studentId !== sid));
  state.students = state.students.filter(s => s.id !== sid);
  saveL(); showPage('students', document.querySelectorAll('nav button')[2], '學生名冊', true); renderAll();
}

// ══════════════════════════════════════════════
function exportData() {
  const blob = new Blob([JSON.stringify(state,null,2)],{type:'application/json'});
  const a = document.createElement('a'); a.href = URL.createObjectURL(blob);
  a.download = '履音備份_'+new Date().toLocaleDateString('zh-HK').replace(/\//g,'-')+'.json'; a.click();
}
function confirmClear() { if (confirm('清除本機快取？Firebase 資料不受影響。')) { localStorage.removeItem(cKey()); location.reload(); } }
function openMo(id) { document.getElementById(id).classList.add('open'); }
function closeMo(id, e) { if (e && e.target !== document.getElementById(id)) return; document.getElementById(id).classList.remove('open'); }
// init exam + ref on page load (no auth needed)
document.addEventListener('DOMContentLoaded', () => { renderExams(); });
